version: "2"

run:
  build-tags:
    - fts5

linters:
  enable:
    - funlen
    - cyclop
    - gocognit
    - nestif
    - dupl
    - goconst
    - gocritic
    - misspell
    - nakedret
    - unconvert
    - dupword
    - maintidx
    - revive

  settings:
    funlen:
      lines: 80
      statements: 50
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 30
    nestif:
      min-complexity: 5
    dupl:
      threshold: 150
    goconst:
      min-occurrences: 3
      min-len: 3
    nakedret:
      max-func-lines: 30
    maintidx:
      under: 15
    revive:
      rules:
        - name: file-length-limit
          arguments:
            - max: 800
              skip-comments: true
              skip-blank-lines: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - cyclop
          - gocognit
          - dupl
          - goconst
          - maintidx
    paths:
      # protoc-gen-go / protoc-gen-go-grpc output — regenerated by `make
      # proto`, never hand-edited, and not worth policing with hand-written
      # code limits. golangci-lint's default generated-file detection
      # already skips most linters here, but this is an explicit belt-and-
      # braces exclusion since this dir is committed, not gitignored.
      - proto/.*\.pb\.go$

issues:
  new: true
